services:
  - type: web
    name: smartreach-crm-backend
    env: node
    buildCommand: cd smartreach-crm/backend && npm install --production
    startCommand: cd smartreach-crm/backend && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false
  
  - type: web
    name: smartreach-crm-frontend
    env: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/build
    envVars:
      - key: REACT_APP_API_URL
        value: https://smartreach-crm-backend.onrender.com/api
