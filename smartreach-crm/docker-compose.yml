version: '3.8'

services:
  mongo:
    image: mongo:7
    container_name: smartreach_mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: smartreach_crm

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: smartreach_backend
    restart: unless-stopped
    ports:
      - '5000:5000'
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017/smartreach_crm
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      FRONTEND_URL: http://localhost:3000
      NODE_ENV: development
    depends_on:
      - mongo
    volumes:
      - ./backend:/app
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: smartreach_frontend
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
    depends_on:
      - backend

volumes:
  mongo_data:
